# Single-ESP Sonicare BLE bridge + SSD1306 SPI OLED (ESP32-PICO-KIT).
#
# Superset of esphome/atom-lite.yaml: the SAME bridge config (so the HA
# integration + Toothbrush Card keep working unchanged), PLUS on-device decode
# of GATT values into ESPHome sensors that drive a local SH1106 OLED. The OLED
# works even when HA/WiFi is down because the bytes are decoded on the bridge.
#
# Requires the FORKED philips_sonicare component with the decode-tap patch
# (adds the brushing_time:/battery_level:/... keys below). The display layout
# was designed in esphome/oled-design.html (Roboto Mono, 3 pages).

substitutions:
  name: sonicare-oled
  friendly_name: "Sonicare OLED Bridge"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# ESP-IDF is required (Bluedroid notification limit is only configurable via
# sdkconfig). Same rationale as atom-lite.yaml.
esp32:
  board: pico32              # ESP32-PICO-KIT (ESP32-PICO-D4)
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_MAX_CACHE_CHAR: "80"
      CONFIG_BT_GATTC_NOTIF_REG_MAX: "20"

logger:
  level: INFO                # DEBUG is very chatty with BLE notifications

# The bridge registers its HA services via CustomAPIDevice — these two flags
# are REQUIRED or the integration can't talk to the bridge.
api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Sonicare-OLED-Fallback"
    password: !secret fallback_password

captive_portal:

# --- BLE ---
esp32_ble:
  io_capability: none
  max_notifications: 20

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 211ms
    window: 120ms

# --- Point this at your fork containing the decode-tap patch ---------------
external_components:
  - source:
      type: git
      url: https://github.com/dityaaa/philips_sonicare_ble
      ref: master                 # decode tap + display reads are on master
      path: esphome/components
    components: [philips_sonicare]
    refresh: 0s

# --- The bridge (Mode B auto-discovery, paired from the HA setup flow) ------
# Each decoded value is an ordinary ESPHome sensor/text_sensor: it shows up in
# HA *and* is readable from the display lambda via id().
philips_sonicare:
  - id: philips_sonicare_ble
    notify_throttle_ms: 500          # only throttles HA events; OLED is decoded pre-throttle
    connected:
      name: "Brush BLE Connected"
      id: brush_connected
    # numeric sensors
    brushing_time:   { name: "Brushing Time",   id: brush_time,   unit_of_measurement: "s" }
    routine_length:  { name: "Routine Length",  id: brush_target, unit_of_measurement: "s" }
    battery_level:   { name: "Brush Battery",   id: brush_batt }
    pressure:        { name: "Brush Pressure",  id: brush_pressure }
    # text sensors
    handle_state:    { name: "Handle State",    id: brush_handle }
    brushing_state:  { name: "Brushing State",  id: brush_state }
    brushing_mode:   { name: "Brushing Mode",   id: brush_mode }
    intensity:       { name: "Intensity",       id: brush_intensity }
    on_connect:
      then:
        - logger.log: "Connected to Sonicare"
    on_disconnect:
      then:
        - logger.log: "Disconnected from Sonicare"

# Note: the ESP32-PICO-KIT has no addressable RGB LED (only a fixed power LED),
# so there is no status_led. Connection state shows on the OLED and the
# "Brush BLE Connected" binary_sensor in HA.

# --- Display state + button ------------------------------------------------
globals:
  - id: page                 # which page the button last selected (0..2)
    type: int
    restore_value: no
    initial_value: "0"

binary_sensor:
  # Onboard BOOT button (GPIO0) cycles the 3 display pages. GPIO0 is a
  # strapping pin with an onboard pull-up; a momentary press at runtime is
  # fine (only holding it during reset enters download mode). PICO-KIT's
  # GPIO39 is input-only with no internal pull-up, so avoid it for a button.
  - platform: gpio
    name: "Page Button"
    pin:
      number: GPIO0
      inverted: true
      mode: { input: true, pullup: true }
    on_press:
      - lambda: 'id(page) = (id(page) + 1) % 3;'

  # --- Control buttons (wire a momentary switch from the GPIO to GND) --------
  # These call into the worker (id: philips_sonicare_ble), which forwards to the
  # coordinator's cycle_* helpers: write the new value to the brush AND update
  # the display sensor immediately. Mode write is only honored by write-capable
  # models (Prestige HX999X / HX74xx); other models log a refusal and the OLED
  # reverts on the next read. Use any free GPIO — GPIO25/GPIO33 are broken out
  # on the PICO-KIT and safe (not strapping pins).
  - platform: gpio
    name: "Mode Button"
    pin:
      number: GPIO25
      inverted: true
      mode: { input: true, pullup: true }
    on_press:
      - lambda: 'id(philips_sonicare_ble).cycle_brushing_mode(6);'

  - platform: gpio
    name: "Intensity Button"
    pin:
      number: GPIO33
      inverted: true
      mode: { input: true, pullup: true }
    on_press:
      - lambda: 'id(philips_sonicare_ble).cycle_intensity(3);'

# 4-wire SPI bus for the SSD1306 OLED. clk = SPI SCLK, mosi = SPI MOSI (the
# display's DIN/D1). MISO is unused by the display (write-only) and omitted.
# GPIO18/23 are the ESP32 default VSPI pins, broken out on the PICO-KIT.
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

# Roboto Mono — the approved family (gfonts://Roboto Mono). bpp:1 = 1-bit,
# matching the mono SSD1306. Sizes/weights mirror the design tool.
font:
  - file: "gfonts://Roboto Mono"
    id: font_sm
    size: 11
    bpp: 1
  - file:
      type: gfonts
      family: Roboto Mono
      weight: 500
    id: font_md
    size: 16
    bpp: 1
  - file:
      type: gfonts
      family: Roboto Mono
      weight: 700
    id: font_lg
    size: 26
    bpp: 1
  - file:
      type: gfonts
      family: Roboto Mono
      weight: 700
    id: font_warn
    size: 16
    bpp: 1

display:
  - platform: ssd1306_spi
    model: "SSD1306 128x64"
    cs_pin: GPIO5      # SPI chip select (CS)
    dc_pin: GPIO16     # data/command (DC)
    reset_pin: GPIO17  # display reset (RES) — omit if your module has none
    update_interval: 200ms
    lambda: |-
      // ── label maps (raw sensor keys → display text) ──────────────────────
      auto mode_label = [](const std::string &m) -> std::string {
        if (m == "clean")           return "Clean";
        if (m == "white_plus")      return "White+";
        if (m == "gum_health")      return "Gum Health";
        if (m == "deep_clean_plus") return "Deep Clean+";
        if (m == "sensitive")       return "Sensitive";
        if (m == "tongue_care")     return "Tongue";
        return m;
      };
      auto state_label = [](const std::string &s) -> std::string {
        if (s == "off")               return "Idle";
        if (s == "on")                return "Brushing";
        if (s == "pause")             return "Paused";
        if (s == "session_complete")  return "Complete";
        if (s == "session_aborted")   return "Stopped";
        return s;
      };
      auto cap = [](std::string s) -> std::string {
        if (!s.empty()) s[0] = toupper(s[0]);
        return s;
      };
      // Battery glyph. small=14x7, big=28x12. Mirrors drawBatteryGlyph().
      auto batt_glyph = [&](int x, int y, int pct, bool big) {
        int w = big ? 28 : 14, h = big ? 12 : 7;
        it.rectangle(x, y, w, h);
        it.filled_rectangle(x + w, y + (h * 28 / 100), 2, (h * 44 / 100));  // nub
        if (pct < 0) pct = 0; if (pct > 100) pct = 100;
        int fill = (w - 4) * pct / 100;
        if (fill > 0) it.filled_rectangle(x + 2, y + 2, fill, h - 4);
      };

      // ── read state ───────────────────────────────────────────────────────
      bool conn = id(brush_connected).has_state() && id(brush_connected).state;
      std::string bs = id(brush_state).has_state() ? id(brush_state).state : "off";
      bool brushing = (bs == "on" || bs == "pause");
      int t   = id(brush_time).has_state()   ? (int) id(brush_time).state   : 0;
      int tgt = id(brush_target).has_state() ? (int) id(brush_target).state : 120;
      int bat = id(brush_batt).has_state()   ? (int) id(brush_batt).state   : 0;
      int prs = id(brush_pressure).has_state() ? (int) id(brush_pressure).state : 0;
      const int WARN = 250;

      // ── page selection: button picks 0..2, but a pressure warning while
      //    brushing forces the Pressure page automatically. ─────────────────
      int pg = id(page);
      if (brushing && prs >= WARN) pg = 2;

      // Disconnected splash (any page).
      if (!conn) {
        it.printf(64, 18, id(font_md), TextAlign::CENTER, "Sonicare");
        it.printf(64, 44, id(font_sm), TextAlign::CENTER, "Waiting for brush");
        return;
      }

      if (pg == 0) {
        // ── Page 1: Brushing hero ──────────────────────────────────────────
        it.printf(0, 0, id(font_sm), TextAlign::TOP_LEFT, "%s", state_label(bs).c_str());
        batt_glyph(112, 1, bat, false);
        it.printf(64, 10, id(font_lg), TextAlign::TOP_CENTER, "%d:%02d", t / 60, t % 60);
        // progress bar toward routine length
        it.rectangle(0, 41, 128, 8);
        int frac = (tgt > 0) ? (126 * t / tgt) : 0;
        if (frac > 126) frac = 126;
        if (frac > 0) it.filled_rectangle(1, 42, frac, 6);
        // Bottom row at y=51: an 11px font spans rows 51..62, clearing the
        // 64px panel (y=55 clipped descenders like the 'p' in "Deep Clean+").
        std::string ml = id(brush_mode).has_state() ? mode_label(id(brush_mode).state) : "";
        it.printf(0, 51, id(font_sm), TextAlign::TOP_LEFT, "%s", ml.c_str());
        if (brushing && id(brush_intensity).has_state())
          it.printf(128, 51, id(font_sm), TextAlign::TOP_RIGHT, "%s",
                    cap(id(brush_intensity).state).c_str());

      } else if (pg == 1) {
        // ── Page 2: Status ─────────────────────────────────────────────────
        batt_glyph(0, 3, bat, true);
        it.printf(42, 1, id(font_md), TextAlign::TOP_LEFT, "%d%%", bat);
        it.line(0, 22, 128, 22);
        std::string hl = id(brush_handle).has_state() ? cap(id(brush_handle).state) : "?";
        std::string ml = id(brush_mode).has_state() ? mode_label(id(brush_mode).state) : "?";
        it.printf(0, 26, id(font_sm), TextAlign::TOP_LEFT, "Handle: %s", hl.c_str());
        it.printf(0, 39, id(font_sm), TextAlign::TOP_LEFT, "Mode: %s", ml.c_str());
        it.printf(0, 52, id(font_sm), TextAlign::TOP_LEFT, "Routine: %ds", tgt);

      } else {
        // ── Page 3: Pressure ───────────────────────────────────────────────
        if (!brushing) {
          it.printf(64, 18, id(font_md), TextAlign::CENTER, "Pressure");
          it.printf(64, 44, id(font_sm), TextAlign::CENTER, "No active session");
          return;
        }
        if (prs >= WARN) {
          // Inverted alarm banner: white block, black text.
          it.filled_rectangle(0, 0, 128, 24);
          it.printf(64, 4, id(font_warn), COLOR_OFF, TextAlign::TOP_CENTER, "TOO HARD!");
          it.printf(64, 30, id(font_sm), TextAlign::TOP_CENTER, "Ease off the pressure");
        } else {
          it.printf(0, 2, id(font_sm), TextAlign::TOP_LEFT, "Pressure");
          it.printf(128, 0, id(font_md), TextAlign::TOP_RIGHT, "%dg", prs);
        }
        // pressure bar + "too high" threshold tick
        it.rectangle(0, 50, 128, 12);
        int pf = 126 * prs / 350;
        if (pf > 126) pf = 126;
        if (pf > 0) it.filled_rectangle(1, 51, pf, 10);
        int tx = 126 * WARN / 350;
        it.line(tx, 47, tx, 62);
      }
